name                = "notion-widgets-webhook"
main                = "worker.js"
compatibility_date  = "2024-09-01"

# ── Secrets ────────────────────────────────────────────────────
# Do NOT put secret values here. Set them via the CLI:
#
#   wrangler secret put NOTION_TOKEN
#   wrangler secret put NOTION_DB_ID
#   wrangler secret put NOTION_HABITS_DB_ID
#
# NOTION_TOKEN         → your Notion Internal Integration Secret
#                        (starts with "ntn_" or "secret_")
#                        Get it at: https://www.notion.so/my-integrations
#
# NOTION_DB_ID         → Pomodoro database ID (32-char from URL)
#
# NOTION_HABITS_DB_ID  → Habit Tracker database ID (32-char from URL)
#
#   wrangler secret put NOTION_WIDGET_DATA_DB_ID
#   wrangler secret put NOTION_STICKY_DB_ID
#
# NOTION_WIDGET_DATA_DB_ID → Widget Data database ID (shared config for matrix/countdown/news/weather)
# NOTION_STICKY_DB_ID      → Sticky Notes database ID (one row per note)

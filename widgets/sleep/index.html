<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Log</title>
  <link rel="stylesheet" href="../../shared/base.css" />
  <link rel="stylesheet" href="../../shared/sync.css" />
  <script src="../../shared/theme.js"></script>
  <script>var SYNC_URL=''</script>
  <script src="../../shared/config.js"></script>
  <script src="../../shared/sync.js"></script>

  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0.6rem;
      gap: 0;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────── */
    .sleep-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0 0.4rem;
      flex-shrink: 0;
    }

    .sleep-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--color-text);
      flex: 1;
    }

    .sleep-avg {
      font-size: 0.6rem;
      color: var(--color-text-muted);
      font-weight: 500;
    }

    /* ── Today quick-log ─────────────────────────────── */
    .today-log {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.5rem;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }

    .today-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    .today-times {
      flex: 1;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .time-group {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .time-group label {
      font-size: 0.55rem;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }

    .time-group input[type="time"] {
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 0.2em 0.35em;
      font-family: inherit;
      font-size: 0.72rem;
      color: var(--color-text);
      background: transparent;
      outline: none;
    }
    .time-group input[type="time"]:focus { border-color: var(--color-accent); }

    .today-duration {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--color-accent);
      white-space: nowrap;
    }

    /* ── Bar chart ───────────────────────────────────── */
    .chart-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 0;
      padding: 0.2rem 0;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex: 1;
      min-height: 20px;
      cursor: pointer;
      border-radius: 4px;
      padding: 0 0.2rem;
      transition: background 0.15s;
    }
    .bar-row:hover { background: rgba(0,0,0,0.03); }
    @media (prefers-color-scheme: dark) { .bar-row:hover { background: rgba(255,255,255,0.04); } }
    html[data-theme="dark"] .bar-row:hover { background: rgba(255,255,255,0.04); }

    .bar-day {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--color-text-muted);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 70%;
      background: rgba(0,0,0,0.04);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      min-height: 14px;
    }
    @media (prefers-color-scheme: dark) { .bar-track { background: rgba(255,255,255,0.06); } }
    html[data-theme="dark"] .bar-track { background: rgba(255,255,255,0.06); }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      padding: 0 0.3rem;
      min-width: 0;
    }

    .bar-fill.good    { background: #40c463; }
    .bar-fill.ok      { background: #f59e0b; }
    .bar-fill.poor    { background: #ef4444; }

    .bar-label {
      font-size: 0.5rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
    }

    .bar-hours {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--color-text-muted);
      width: 32px;
      text-align: left;
      flex-shrink: 0;
    }

    .no-data {
      font-size: 0.6rem;
      color: var(--color-text-muted);
      opacity: 0.5;
    }

    /* ── Edit dialog ─────────────────────────────────── */
    .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .edit-overlay.open { opacity: 1; pointer-events: auto; }

    .edit-dialog {
      background: var(--color-bg, #fff);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    @media (prefers-color-scheme: dark) { .edit-dialog { background: #1e1f25; } }
    html[data-theme="dark"] .edit-dialog { background: #1e1f25; }
    html[data-theme="light"] .edit-dialog { background: #fff; }

    .edit-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--color-text);
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .edit-field label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .edit-field input[type="time"] {
      padding: 0.4em 0.5em;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--color-text);
      background: transparent;
      outline: none;
    }
    .edit-field input[type="time"]:focus { border-color: var(--color-accent); }

    .edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
      margin-top: 0.2rem;
    }

    .btn-edit-cancel {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 0.76rem;
    }

    .btn-edit-save {
      padding: 0.35em 0.8em;
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Settings panel ────────────────────────────── */
    .settings-panel { position:fixed; inset:0; background:var(--color-bg,#fff); padding:1rem 1.2rem; display:flex; flex-direction:column; gap:0.8rem; transform:translateY(100%); transition:transform 0.25s ease; z-index:10; overflow-y:auto; }
    .settings-panel.open { transform:translateY(0); }
    @media (prefers-color-scheme:dark) { .settings-panel { background:#191a1f; } }
    html[data-theme="dark"]  .settings-panel { background:#191a1f; }
    html[data-theme="light"] .settings-panel { background:#fff; }

    .settings-title { font-size:0.82rem; font-weight:700; color:var(--color-text); }
    .settings-subtitle { font-size:0.68rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-text-muted); }

    .goal-field {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .goal-field input[type="number"] {
      width: 60px;
      padding: 0.4em 0.5em;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--color-text);
      background: transparent;
      outline: none;
      text-align: center;
    }

    .goal-field span {
      font-size: 0.72rem;
      color: var(--color-text-muted);
    }

    .sync-section { border-top:1px solid var(--color-border); padding-top:0.7rem; margin-top:0.3rem; }
    .sync-field { display:flex; flex-direction:column; gap:0.3rem; }
    .sync-field label { font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-text-muted); }
    .sync-field input[type="url"] { padding:0.4em 0.6em; border:1.5px solid var(--color-border); border-radius:6px; font-size:0.78rem; font-family:inherit; color:var(--color-text); background:transparent; outline:none; width:100%; box-sizing:border-box; }
    .sync-field input[type="url"]:focus { border-color:var(--color-accent); }
    .webhook-row { display:flex; gap:0.4rem; align-items:flex-end; }
    .webhook-row input { flex:1; }
    .btn-test { padding:0.4em 0.8em; background:var(--color-accent); color:#fff; border:none; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-test:hover { opacity:0.85; }
    .test-result { font-size:0.65rem; min-height:1.1em; color:var(--color-text-muted); }
    .sync-hint { font-size:0.6rem; color:var(--color-text-muted); opacity:0.7; }

    .settings-actions { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:0.3rem; }
    .btn-save { padding:0.4em 1em; background:var(--color-accent); color:#fff; border:none; border-radius:6px; font-size:0.78rem; font-weight:600; cursor:pointer; }
    .btn-cancel { background:none; border:none; cursor:pointer; color:var(--color-text-muted); font-size:0.78rem; }
  </style>
</head>
<body>

  <div class="widget-bar">
    <span id="syncStatus" class="sync-ind"></span>
    <button id="gearBtn" title="Settings">⚙</button>
    <button class="theme-switch" onclick="__toggleTheme()" title="Toggle light/dark" aria-label="Toggle theme">
      <span class="theme-switch__icon">☀</span>
      <span class="theme-switch__track"><span class="theme-switch__thumb"></span></span>
      <span class="theme-switch__icon">🌙</span>
    </button>
  </div>

  <div class="sleep-header">
    <span class="sleep-title">Sleep Log</span>
    <span class="sleep-avg" id="weekAvg"></span>
  </div>

  <!-- Today quick log -->
  <div class="today-log">
    <span class="today-label">Today</span>
    <div class="today-times">
      <div class="time-group">
        <label>Bed</label>
        <input type="time" id="todayBed" />
      </div>
      <div class="time-group">
        <label>Wake</label>
        <input type="time" id="todayWake" />
      </div>
    </div>
    <span class="today-duration" id="todayDuration"></span>
  </div>

  <!-- Bar chart for last 7 days -->
  <div class="chart-area" id="chartArea"></div>

  <!-- Edit dialog -->
  <div class="edit-overlay" id="editOverlay">
    <div class="edit-dialog">
      <span class="edit-title" id="editTitle">Edit Sleep</span>
      <div class="edit-field">
        <label>Bedtime</label>
        <input type="time" id="editBed" />
      </div>
      <div class="edit-field">
        <label>Wake time</label>
        <input type="time" id="editWake" />
      </div>
      <div class="edit-actions">
        <button class="btn-edit-cancel" id="editCancel">Cancel</button>
        <button class="btn-edit-save" id="editSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <span class="settings-title">Sleep Settings</span>

    <div>
      <span class="settings-subtitle">Sleep Goal</span>
      <div class="goal-field" style="margin-top:0.3rem;">
        <input type="number" id="goalInput" min="1" max="14" step="0.5" />
        <span>hours per night</span>
      </div>
    </div>

    <div class="sync-section">
      <span class="settings-subtitle">Notion Sync</span>
      <div class="sync-field" style="margin-top:0.3rem;">
        <div class="webhook-row">
          <input type="url" id="syncUrlInput" placeholder="https://your-worker.workers.dev" autocomplete="off" />
          <button class="btn-test" id="testSyncBtn">Test</button>
        </div>
        <div class="test-result" id="testResult"></div>
        <span class="sync-hint">Sync sleep data across devices via Notion.</span>
      </div>
    </div>

    <div class="settings-actions">
      <button class="btn-cancel" id="cancelSettingsBtn">Cancel</button>
      <button class="btn-save" id="saveSettingsBtn">Save</button>
    </div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────
    const STORE_KEY = 'sleep-log';
    let data = { entries: {}, goal: 8 };

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY));
        if (saved) data = { entries: {}, goal: 8, ...saved };
      } catch {}
    }

    function save() {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
      pushToNotion();
    }

    // ── Date/time helpers ────────────────────────────
    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function getDaysAgo(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      return d.toISOString().slice(0, 10);
    }

    function sleepHours(bed, wake) {
      if (!bed || !wake) return null;
      const [bh, bm] = bed.split(':').map(Number);
      const [wh, wm] = wake.split(':').map(Number);
      let bedMin = bh * 60 + bm;
      let wakeMin = wh * 60 + wm;
      // If bedtime is after noon and wake is before noon, assume cross-midnight
      if (bedMin > wakeMin) wakeMin += 24 * 60;
      const dur = (wakeMin - bedMin) / 60;
      return dur > 0 && dur <= 24 ? Math.round(dur * 10) / 10 : null;
    }

    function formatHours(h) {
      if (h === null) return '—';
      const hrs = Math.floor(h);
      const mins = Math.round((h - hrs) * 60);
      return mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`;
    }

    function dayLabel(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(undefined, { weekday: 'short' });
    }

    // ── Render ────────────────────────────────────────
    function render() {
      renderToday();
      renderChart();
      renderWeekAvg();
    }

    function renderToday() {
      const t = todayStr();
      const entry = data.entries[t] || {};
      document.getElementById('todayBed').value = entry.bed || '';
      document.getElementById('todayWake').value = entry.wake || '';
      updateTodayDuration();
    }

    function updateTodayDuration() {
      const bed = document.getElementById('todayBed').value;
      const wake = document.getElementById('todayWake').value;
      const el = document.getElementById('todayDuration');
      const hrs = sleepHours(bed, wake);
      el.textContent = hrs !== null ? formatHours(hrs) : '';
    }

    function renderChart() {
      const chart = document.getElementById('chartArea');
      const maxHrs = Math.max(data.goal + 2, 12); // scale bars to max

      let html = '';
      // Show last 7 days (excluding today since it has its own section)
      for (let i = 1; i <= 7; i++) {
        const dateStr = getDaysAgo(i);
        const entry = data.entries[dateStr];
        const hrs = entry ? sleepHours(entry.bed, entry.wake) : null;
        const pct = hrs !== null ? Math.min(hrs / maxHrs * 100, 100) : 0;

        let barClass = 'good';
        if (hrs !== null) {
          if (hrs < data.goal - 1) barClass = 'poor';
          else if (hrs < data.goal) barClass = 'ok';
        }

        const timeLabel = entry && entry.bed && entry.wake ? `${entry.bed}–${entry.wake}` : '';

        html += `
          <div class="bar-row" data-date="${dateStr}">
            <span class="bar-day">${dayLabel(dateStr)}</span>
            <div class="bar-track">
              ${hrs !== null ? `<div class="bar-fill ${barClass}" style="width:${pct}%"><span class="bar-label">${timeLabel}</span></div>` : '<span class="no-data" style="padding:0 0.3rem;">—</span>'}
            </div>
            <span class="bar-hours">${hrs !== null ? formatHours(hrs) : ''}</span>
          </div>`;
      }

      chart.innerHTML = html;

      // Bind row clicks to open edit dialog
      chart.querySelectorAll('.bar-row').forEach(row => {
        row.addEventListener('click', () => openEdit(row.dataset.date));
      });
    }

    function renderWeekAvg() {
      let total = 0, count = 0;
      for (let i = 0; i <= 7; i++) {
        const entry = data.entries[getDaysAgo(i)];
        if (entry) {
          const hrs = sleepHours(entry.bed, entry.wake);
          if (hrs !== null) { total += hrs; count++; }
        }
      }
      const avg = count > 0 ? total / count : null;
      document.getElementById('weekAvg').textContent = avg !== null ? `Avg: ${formatHours(avg)}/night` : '';
    }

    // ── Today quick-log ──────────────────────────────
    document.getElementById('todayBed').addEventListener('change', saveTodayEntry);
    document.getElementById('todayWake').addEventListener('change', saveTodayEntry);

    function saveTodayEntry() {
      const bed = document.getElementById('todayBed').value;
      const wake = document.getElementById('todayWake').value;
      if (!bed && !wake) {
        delete data.entries[todayStr()];
      } else {
        data.entries[todayStr()] = { bed: bed || '', wake: wake || '' };
      }
      save();
      updateTodayDuration();
      renderChart();
      renderWeekAvg();
    }

    // ── Edit dialog ──────────────────────────────────
    let editDate = null;

    function openEdit(dateStr) {
      editDate = dateStr;
      const entry = data.entries[dateStr] || {};
      const d = new Date(dateStr + 'T12:00:00');
      document.getElementById('editTitle').textContent = d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
      document.getElementById('editBed').value = entry.bed || '';
      document.getElementById('editWake').value = entry.wake || '';
      document.getElementById('editOverlay').classList.add('open');
    }

    document.getElementById('editCancel').addEventListener('click', () => {
      document.getElementById('editOverlay').classList.remove('open');
    });

    document.getElementById('editOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('editOverlay')) {
        document.getElementById('editOverlay').classList.remove('open');
      }
    });

    document.getElementById('editSave').addEventListener('click', () => {
      const bed = document.getElementById('editBed').value;
      const wake = document.getElementById('editWake').value;
      if (!bed && !wake) {
        delete data.entries[editDate];
      } else {
        data.entries[editDate] = { bed: bed || '', wake: wake || '' };
      }
      save();
      render();
      document.getElementById('editOverlay').classList.remove('open');
    });

    // ── Settings ─────────────────────────────────────
    document.getElementById('gearBtn').addEventListener('click', () => {
      document.getElementById('goalInput').value = data.goal;
      document.getElementById('syncUrlInput').value = sync.url;
      document.getElementById('testResult').textContent = '';
      document.getElementById('settingsPanel').classList.add('open');
    });

    document.getElementById('cancelSettingsBtn').addEventListener('click', () => {
      document.getElementById('settingsPanel').classList.remove('open');
    });

    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
      data.goal = parseFloat(document.getElementById('goalInput').value) || 8;
      sync.saveUrl(document.getElementById('syncUrlInput').value.trim());

      save();
      document.getElementById('settingsPanel').classList.remove('open');
      render();
    });

    // ── Sync ─────────────────────────────────────────
    const sync = WidgetSync.init({ name: 'sleep', key: 'sleep', indicatorEl: '#syncStatus' });

    function isDefault(d) {
      if (!d || !d.entries) return true;
      return Object.keys(d.entries).length === 0 && (d.goal === 8 || !d.goal);
    }

    // Only sync last 30 days to stay within Notion size limits
    function getSyncPayload() {
      const syncEntries = {};
      for (let i = 0; i < 30; i++) {
        const d = getDaysAgo(i);
        if (data.entries[d]) syncEntries[d] = data.entries[d];
      }
      return { entries: syncEntries, goal: data.goal, lastModified: data.lastModified };
    }

    async function syncFromNotion() {
      const remote = await sync.pull();
      if (!remote) {
        if (!isDefault(data)) { data.lastModified = data.lastModified || Date.now(); localStorage.setItem(STORE_KEY, JSON.stringify(data)); sync.pushNow(getSyncPayload()); }
        return;
      }
      const v = WidgetSync.resolve(data, remote, isDefault);
      if (v.action === 'use-remote') {
        if (remote.goal) data.goal = remote.goal;
        if (remote.entries) Object.assign(data.entries, remote.entries);
        if (remote.lastModified) data.lastModified = remote.lastModified;
        localStorage.setItem(STORE_KEY, JSON.stringify(data));
        render();
      } else if (v.action === 'use-local') {
        data.lastModified = data.lastModified || Date.now(); localStorage.setItem(STORE_KEY, JSON.stringify(data)); sync.pushNow(getSyncPayload());
      }
    }

    function pushToNotion() {
      data.lastModified = Date.now(); localStorage.setItem(STORE_KEY, JSON.stringify(data)); sync.push(getSyncPayload());
    }

    document.getElementById('testSyncBtn').addEventListener('click', async () => {
      const rEl = document.getElementById('testResult');
      const url = document.getElementById('syncUrlInput').value.trim();
      const res = await WidgetSync.testConnection(url, { action: 'config-load', key: 'sleep' });
      rEl.textContent = res.message;
      rEl.style.color = res.ok ? '#40c463' : '#e74c3c';
    });

    // ── Init ──────────────────────────────────────────
    load();
    render();
    if (sync.url) syncFromNotion();
  </script>
</body>
</html>

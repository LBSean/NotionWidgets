<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chore Rotation</title>
  <link rel="stylesheet" href="../../shared/base.css" />
  <script src="../../shared/theme.js"></script>

  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0.6rem;
      gap: 0;
      overflow: hidden;
    }

    /* ── Chore list ──────────────────────────────────── */
    .chore-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0.2rem 0;
    }

    .chore-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.5rem;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .chore-item:hover { background: rgba(0,0,0,0.04); }
    @media (prefers-color-scheme: dark) { .chore-item:hover { background: rgba(255,255,255,0.05); } }
    html[data-theme="dark"] .chore-item:hover { background: rgba(255,255,255,0.05); }

    .chore-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chore-info {
      flex: 1;
      min-width: 0;
    }

    .chore-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chore-due {
      font-size: 0.62rem;
      font-weight: 500;
      margin-top: 1px;
    }
    .chore-due.overdue { color: #ef4444; }
    .chore-due.today   { color: #f59e0b; }
    .chore-due.upcoming { color: var(--color-text-muted); }

    .chore-check {
      background: none;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .chore-check:hover {
      border-color: #40c463;
      color: #40c463;
      background: rgba(64,196,99,0.08);
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.78rem;
      padding: 2rem;
    }

    /* ── Sync indicator ────────────────────────────── */
    .sync-indicator { display:inline-block; font-size:0.55rem; width:1em; text-align:center; vertical-align:middle; margin-left:4px; }
    .sync-indicator.syncing { color:var(--color-text-muted); animation:spin 1s linear infinite; }
    .sync-indicator.synced  { color:#40c463; }
    .sync-indicator.error   { color:#e74c3c; font-weight:700; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Settings panel ────────────────────────────── */
    .settings-panel { position:fixed; inset:0; background:var(--color-bg,#fff); padding:1rem 1.2rem; display:flex; flex-direction:column; gap:0.7rem; transform:translateY(100%); transition:transform 0.25s ease; z-index:10; overflow-y:auto; }
    .settings-panel.open { transform:translateY(0); }
    @media (prefers-color-scheme:dark) { .settings-panel { background:#191a1f; } }
    html[data-theme="dark"]  .settings-panel { background:#191a1f; }
    html[data-theme="light"] .settings-panel { background:#fff; }

    .settings-title { font-size:0.82rem; font-weight:700; color:var(--color-text); }
    .settings-subtitle { font-size:0.68rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-text-muted); margin-top:0.3rem; }

    .chore-edit-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 40vh;
      overflow-y: auto;
    }

    .chore-edit-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.4rem;
      border-radius: 6px;
      background: rgba(0,0,0,0.03);
    }
    html[data-theme="dark"] .chore-edit-row { background: rgba(255,255,255,0.04); }

    .chore-edit-row input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--color-text);
      min-width: 0;
    }

    .chore-edit-row input[type="number"] {
      width: 50px;
      border: 1.5px solid var(--color-border);
      border-radius: 4px;
      padding: 0.2em 0.3em;
      font-family: inherit;
      font-size: 0.72rem;
      color: var(--color-text);
      background: transparent;
      text-align: center;
      outline: none;
    }

    .chore-edit-row input[type="color"] {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      background: none;
    }

    .chore-edit-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 0.9rem;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .chore-edit-del:hover { color: #ef4444; }

    .btn-add-chore {
      padding: 0.35em 0.7em;
      background: transparent;
      border: 1.5px dashed var(--color-border);
      border-radius: 6px;
      color: var(--color-text-muted);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-add-chore:hover { border-color: var(--color-accent); color: var(--color-accent); }

    .interval-label {
      font-size: 0.6rem;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    /* Sync section in settings */
    .sync-section { border-top:1px solid var(--color-border); padding-top:0.7rem; margin-top:0.3rem; }
    .sync-field { display:flex; flex-direction:column; gap:0.3rem; }
    .sync-field label { font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-text-muted); }
    .sync-field input[type="url"] { padding:0.4em 0.6em; border:1.5px solid var(--color-border); border-radius:6px; font-size:0.78rem; font-family:inherit; color:var(--color-text); background:transparent; outline:none; width:100%; box-sizing:border-box; }
    .sync-field input[type="url"]:focus { border-color:var(--color-accent); }
    .webhook-row { display:flex; gap:0.4rem; align-items:flex-end; }
    .webhook-row input { flex:1; }
    .btn-test { padding:0.4em 0.8em; background:var(--color-accent); color:#fff; border:none; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-test:hover { opacity:0.85; }
    .test-result { font-size:0.65rem; min-height:1.1em; color:var(--color-text-muted); }
    .sync-hint { font-size:0.6rem; color:var(--color-text-muted); opacity:0.7; }

    .settings-actions { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:0.3rem; }
    .btn-save { padding:0.4em 1em; background:var(--color-accent); color:#fff; border:none; border-radius:6px; font-size:0.78rem; font-weight:600; cursor:pointer; }
    .btn-cancel { background:none; border:none; cursor:pointer; color:var(--color-text-muted); font-size:0.78rem; }
  </style>
</head>
<body>

  <div class="widget-bar">
    <span id="syncStatus" class="sync-indicator"></span>
    <button id="gearBtn" title="Settings">⚙</button>
    <button class="theme-switch" onclick="__toggleTheme()" title="Toggle light/dark" aria-label="Toggle theme">
      <span class="theme-switch__icon">☀</span>
      <span class="theme-switch__track"><span class="theme-switch__thumb"></span></span>
      <span class="theme-switch__icon">🌙</span>
    </button>
  </div>

  <div class="chore-list" id="choreList"></div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <span class="settings-title">Chore Settings</span>

    <span class="settings-subtitle">Chores</span>
    <div class="chore-edit-list" id="choreEditList"></div>
    <button class="btn-add-chore" id="addChoreBtn">+ Add Chore</button>

    <div class="sync-section">
      <span class="settings-subtitle">Notion Sync</span>
      <div class="sync-field">
        <div class="webhook-row">
          <input type="url" id="syncUrlInput" placeholder="https://your-worker.workers.dev" autocomplete="off" />
          <button class="btn-test" id="testSyncBtn">Test</button>
        </div>
        <div class="test-result" id="testResult"></div>
        <span class="sync-hint">Sync chores across devices via Notion.</span>
      </div>
    </div>

    <div class="settings-actions">
      <button class="btn-cancel" id="cancelSettingsBtn">Cancel</button>
      <button class="btn-save" id="saveSettingsBtn">Save</button>
    </div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────
    const STORE_KEY = 'chores-cfg';
    let data = { chores: [] };

    function load() {
      try { data = JSON.parse(localStorage.getItem(STORE_KEY)) || { chores: [] }; } catch { data = { chores: [] }; }
    }

    function save() {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
      pushToNotion();
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    // ── Helpers ───────────────────────────────────────
    function today() { return new Date().toISOString().slice(0, 10); }

    function daysBetween(dateA, dateB) {
      const a = new Date(dateA + 'T00:00:00');
      const b = new Date(dateB + 'T00:00:00');
      return Math.round((b - a) / 86400000);
    }

    function dueInfo(chore) {
      if (!chore.lastDone) return { daysLeft: -Infinity, status: 'overdue', label: 'Never done' };
      const elapsed = daysBetween(chore.lastDone, today());
      const left = chore.intervalDays - elapsed;
      if (left < 0)  return { daysLeft: left, status: 'overdue', label: `${Math.abs(left)}d overdue` };
      if (left === 0) return { daysLeft: 0, status: 'today', label: 'Due today' };
      return { daysLeft: left, status: 'upcoming', label: `in ${left}d` };
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Render ────────────────────────────────────────
    function render() {
      const list = document.getElementById('choreList');

      if (!data.chores.length) {
        list.innerHTML = '<div class="empty-state">No chores yet. Tap ⚙ to add some.</div>';
        return;
      }

      // Sort: overdue first (most overdue at top), then due today, then upcoming (soonest first)
      const sorted = [...data.chores].sort((a, b) => {
        const ai = dueInfo(a), bi = dueInfo(b);
        return ai.daysLeft - bi.daysLeft;
      });

      list.innerHTML = sorted.map(c => {
        const info = dueInfo(c);
        return `
          <div class="chore-item" data-id="${c.id}">
            <span class="chore-dot" style="background:${c.color || '#3b82f6'}"></span>
            <div class="chore-info">
              <div class="chore-name">${esc(c.name)}</div>
              <div class="chore-due ${info.status}">${info.label}</div>
            </div>
            <button class="chore-check" data-id="${c.id}" title="Mark done">✓</button>
          </div>`;
      }).join('');

      // Bind check buttons
      list.querySelectorAll('.chore-check').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const chore = data.chores.find(c => c.id === btn.dataset.id);
          if (chore) {
            chore.lastDone = today();
            save();
            render();
          }
        });
      });
    }

    // ── Settings ──────────────────────────────────────
    let editChores = [];

    function openSettings() {
      editChores = data.chores.map(c => ({ ...c }));
      renderEditList();
      document.getElementById('syncUrlInput').value = syncUrl;
      document.getElementById('testResult').textContent = '';
      document.getElementById('settingsPanel').classList.add('open');
    }

    function renderEditList() {
      const el = document.getElementById('choreEditList');
      el.innerHTML = editChores.map((c, i) => `
        <div class="chore-edit-row" data-idx="${i}">
          <input type="color" value="${c.color || '#3b82f6'}" data-field="color" data-idx="${i}" />
          <input type="text" value="${esc(c.name)}" placeholder="Chore name" data-field="name" data-idx="${i}" />
          <input type="number" value="${c.intervalDays}" min="1" max="365" title="Interval in days" data-field="interval" data-idx="${i}" />
          <span class="interval-label">days</span>
          <button class="chore-edit-del" data-idx="${i}" title="Remove">×</button>
        </div>
      `).join('');

      // Bind inputs
      el.querySelectorAll('input[data-field="name"]').forEach(inp => {
        inp.addEventListener('input', () => { editChores[inp.dataset.idx].name = inp.value; });
      });
      el.querySelectorAll('input[data-field="interval"]').forEach(inp => {
        inp.addEventListener('input', () => { editChores[inp.dataset.idx].intervalDays = parseInt(inp.value) || 1; });
      });
      el.querySelectorAll('input[data-field="color"]').forEach(inp => {
        inp.addEventListener('input', () => { editChores[inp.dataset.idx].color = inp.value; });
      });
      el.querySelectorAll('.chore-edit-del').forEach(btn => {
        btn.addEventListener('click', () => {
          editChores.splice(parseInt(btn.dataset.idx), 1);
          renderEditList();
        });
      });
    }

    document.getElementById('addChoreBtn').addEventListener('click', () => {
      editChores.push({ id: uid(), name: '', intervalDays: 7, lastDone: null, color: '#3b82f6' });
      renderEditList();
      // Focus the new name input
      const inputs = document.querySelectorAll('#choreEditList input[data-field="name"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    });

    document.getElementById('gearBtn').addEventListener('click', openSettings);

    document.getElementById('cancelSettingsBtn').addEventListener('click', () => {
      document.getElementById('settingsPanel').classList.remove('open');
    });

    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
      // Filter out empty-name chores
      data.chores = editChores.filter(c => c.name.trim());
      data.chores.forEach(c => { c.name = c.name.trim(); });

      syncUrl = document.getElementById('syncUrlInput').value.trim();
      localStorage.setItem('chores-sync-url', syncUrl);

      save();
      document.getElementById('settingsPanel').classList.remove('open');
      render();
      renderSyncIndicator();
    });

    // ── Sync ─────────────────────────────────────────
    let syncUrl   = localStorage.getItem('chores-sync-url') || '';
    let syncState = 'idle';

    function renderSyncIndicator() {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      if (!syncUrl) { el.className = 'sync-indicator'; el.textContent = ''; return; }
      if (syncState === 'syncing') { el.className = 'sync-indicator syncing'; el.textContent = '↻'; }
      else if (syncState === 'synced') { el.className = 'sync-indicator synced'; el.textContent = '✓'; }
      else if (syncState === 'error') { el.className = 'sync-indicator error'; el.textContent = '!'; }
      else { el.className = 'sync-indicator'; el.textContent = ''; }
    }

    async function syncFromNotion() {
      if (!syncUrl) return;
      syncState = 'syncing'; renderSyncIndicator();
      try {
        const res = await fetch(syncUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'config-load', key: 'chores' }),
        });
        const json = await res.json();
        if (json.ok && json.data && json.data.chores) {
          data = json.data;
          localStorage.setItem(STORE_KEY, JSON.stringify(data));
          render();
        }
        syncState = 'synced';
      } catch { syncState = 'error'; }
      renderSyncIndicator();
    }

    let _pushTimer;
    async function pushToNotion() {
      if (!syncUrl) return;
      clearTimeout(_pushTimer);
      _pushTimer = setTimeout(async () => {
        syncState = 'syncing'; renderSyncIndicator();
        try {
          await fetch(syncUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'config-save', key: 'chores', data }),
          });
          syncState = 'synced';
        } catch { syncState = 'error'; }
        renderSyncIndicator();
      }, 500);
    }

    document.getElementById('testSyncBtn').addEventListener('click', async () => {
      const url = document.getElementById('syncUrlInput').value.trim();
      const rEl = document.getElementById('testResult');
      if (!url) { rEl.textContent = 'Enter a URL first'; return; }
      rEl.textContent = 'Testing…';
      try {
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'config-load', key: 'chores' }),
        });
        const j = await r.json();
        rEl.textContent = j.ok ? '✓ Connected' + (j.data ? ' — data found' : ' — no data yet') : '✗ ' + (j.error || 'Error');
        rEl.style.color = j.ok ? '#40c463' : '#e74c3c';
      } catch (e) { rEl.textContent = '✗ ' + e.message; rEl.style.color = '#e74c3c'; }
    });

    // ── Init ──────────────────────────────────────────
    load();
    render();
    renderSyncIndicator();
    if (syncUrl) syncFromNotion();
  </script>
</body>
</html>

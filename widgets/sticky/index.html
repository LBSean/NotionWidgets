<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Note</title>
  <link rel="stylesheet" href="../../shared/base.css" />
  <link rel="stylesheet" href="../../shared/sync.css" />
  <script src="../../shared/theme.js"></script>
  <script>var SYNC_URL=''</script>
  <script src="../../shared/config.js"></script>
  <script src="../../shared/sync.js"></script>

  <style>
    body {
      background: #fefce8;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0.75rem 1rem 0.55rem;
    }

    /* ── Tab bar ──────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 0.45rem;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 3px;
      border-bottom: 1px solid rgba(161, 98, 7, 0.12);
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      padding: 0.22rem 0.5rem;
      border-radius: 5px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #a16207;
      background: transparent;
      border: 1.5px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .tab:hover { background: rgba(0,0,0,0.04); }
    .tab.active {
      background: rgba(217, 119, 6, 0.1);
      border-color: #d97706;
      color: #92400e;
    }

    .tab-title-input {
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      color: inherit;
      width: 70px;
      padding: 0;
    }

    .tab-add {
      background: none;
      border: 1.5px dashed rgba(161, 98, 7, 0.25);
      border-radius: 5px;
      cursor: pointer;
      color: #a16207;
      font-size: 0.78rem;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .tab-add:hover {
      background: rgba(0,0,0,0.04);
      border-color: #a16207;
    }

    /* ── Note area ───────────────────────────────────── */
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 0.9rem;
      color: #1c1917;
      line-height: 1.7;
      width: 100%;
      min-height: 0;
    }

    textarea::placeholder { color: #d4c46a; }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      padding-top: 0.3rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #a16207;
      font-size: 1rem;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.07); }
    .icon-btn.danger { color: #dc2626; }

    .saved-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4ade80;
      opacity: 0;
      transition: opacity 0.3s;
      flex-shrink: 0;
    }
    .saved-dot.show { opacity: 1; }

    .word-count {
      font-size: 0.62rem;
      color: #a16207;
      opacity: 0.5;
      margin-left: auto;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #2a270f; }
      textarea { color: #e8e3c0; }
      textarea::placeholder { color: #7a6820; }
      .word-count { color: #c4a83a; }
      .icon-btn { color: #c4a83a; }
    }

    html[data-theme="dark"]  body                   { background: #2a270f; }
    html[data-theme="dark"]  textarea               { color: #e8e3c0; }
    html[data-theme="dark"]  textarea::placeholder  { color: #7a6820; }
    html[data-theme="dark"]  .word-count            { color: #c4a83a; }
    html[data-theme="dark"]  .icon-btn              { color: #c4a83a; }
    html[data-theme="dark"]  .tab                   { color: #c4a83a; }
    html[data-theme="dark"]  .tab.active            { background: rgba(196, 168, 58, 0.12); border-color: #c4a83a; color: #e8e3c0; }
    html[data-theme="dark"]  .tab-bar               { border-bottom-color: rgba(255,255,255,0.06); }
    html[data-theme="dark"]  .tab-add               { color: #c4a83a; border-color: rgba(196, 168, 58, 0.25); }
    html[data-theme="light"] body                   { background: #fefce8; }
    html[data-theme="light"] textarea               { color: #1c1917; }
    html[data-theme="light"] .word-count            { color: #a16207; }
    html[data-theme="light"] .icon-btn              { color: #a16207; }
    html[data-theme="light"] .tab                   { color: #a16207; }
    html[data-theme="light"] .tab-add               { color: #a16207; }

    /* ── Settings panel ────────────────────────────── */
    .settings-panel { position:fixed; inset:0; background:#fefce8; padding:1rem 1.2rem; display:flex; flex-direction:column; gap:0.8rem; transform:translateY(100%); transition:transform 0.25s ease; z-index:10; overflow-y:auto; }
    .settings-panel.open { transform:translateY(0); }
    .settings-title { font-size:0.82rem; font-weight:700; color:#92400e; }
    .sync-field { display:flex; flex-direction:column; gap:0.3rem; }
    .sync-field label { font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#a16207; }
    .sync-field input { padding:0.4em 0.6em; border:1.5px solid rgba(161,98,7,0.2); border-radius:6px; font-size:0.78rem; font-family:inherit; color:#1c1917; background:transparent; outline:none; width:100%; box-sizing:border-box; }
    .sync-field input:focus { border-color:#d97706; }
    .webhook-row { display:flex; gap:0.4rem; align-items:flex-end; }
    .webhook-row input { flex:1; }
    .btn-test { padding:0.4em 0.8em; background:#d97706; color:#fff; border:none; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-test:hover { opacity:0.85; }
    .test-result { font-size:0.65rem; min-height:1.1em; color:#a16207; }
    .sync-hint { font-size:0.6rem; color:#a16207; opacity:0.7; }
    .settings-actions { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:0.3rem; }
    .btn-save-settings { padding:0.4em 1em; background:#d97706; color:#fff; border:none; border-radius:6px; font-size:0.78rem; font-weight:600; cursor:pointer; }
    .btn-save-settings:hover { opacity:0.85; }
    .btn-cancel-settings { background:none; border:none; cursor:pointer; color:#a16207; font-size:0.78rem; }

    @media (prefers-color-scheme:dark) {
      .settings-panel { background:#2a270f; }
      .sync-field input { color:#e8e3c0; border-color:rgba(196,168,58,0.25); }
      .sync-field label { color:#c4a83a; }
      .settings-title { color:#e8e3c0; }
      .test-result, .sync-hint { color:#c4a83a; }
    }
    html[data-theme="dark"] .settings-panel { background:#2a270f; }
    html[data-theme="dark"] .sync-field input { color:#e8e3c0; }
    html[data-theme="dark"] .settings-title { color:#e8e3c0; }
    html[data-theme="light"] .settings-panel { background:#fefce8; }
  </style>
</head>
<body>

  <div class="widget-bar">
    <button id="gearBtn" title="Settings">⚙</button>
    <button class="theme-switch" onclick="__toggleTheme()" title="Toggle light/dark" aria-label="Toggle theme">
      <span class="theme-switch__icon">☀</span>
      <span class="theme-switch__track"><span class="theme-switch__thumb"></span></span>
      <span class="theme-switch__icon">🌙</span>
    </button>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-add" id="addTabBtn" title="New note">+</button>
  </div>

  <textarea id="noteArea" placeholder="Capture a thought…" spellcheck="true"></textarea>

  <div class="footer">
    <span class="saved-dot" id="savedDot"></span>
    <button class="icon-btn" id="clearBtn" title="Clear note">×</button>
    <span class="word-count" id="wordCount"></span>
    <span id="syncStatus" class="sync-ind"></span>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <span class="settings-title">Sync Settings</span>
    <div class="sync-field">
      <label>Worker URL</label>
      <div class="webhook-row">
        <input type="url" id="syncUrlInput" placeholder="https://your-worker.workers.dev" autocomplete="off" />
        <button class="btn-test" id="testSyncBtn">Test</button>
      </div>
      <div class="test-result" id="testResult"></div>
      <span class="sync-hint">Enter your Cloudflare Worker URL to sync notes across devices.</span>
    </div>
    <div class="settings-actions">
      <button class="btn-cancel-settings" id="cancelSettingsBtn">Cancel</button>
      <button class="btn-save-settings" id="saveSettingsBtn">Save</button>
    </div>
  </div>

  <script>
    const STORE_KEY = 'sticky-notes';
    const OLD_KEY   = 'sticky-note';
    const ta        = document.getElementById('noteArea');
    const wcEl      = document.getElementById('wordCount');
    const savedDot  = document.getElementById('savedDot');
    const clearBtn  = document.getElementById('clearBtn');
    const tabBar    = document.getElementById('tabBar');
    const addBtn    = document.getElementById('addTabBtn');

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    // ── Store ───────────────────────────────────────
    let store;

    function loadStore() {
      let s;
      try { s = JSON.parse(localStorage.getItem(STORE_KEY)); } catch {}

      if (s && s.notes && s.notes.length) {
        store = s;
      } else {
        // Fresh or migrate from old single-note key
        const oldContent = localStorage.getItem(OLD_KEY) || '';
        const id = uid();
        store = { notes: [{ id, title: 'Note', content: oldContent }], activeId: id };
        if (oldContent) localStorage.removeItem(OLD_KEY);
        saveStore();
      }

      if (!store.activeId || !store.notes.find(n => n.id === store.activeId)) {
        store.activeId = store.notes[0].id;
      }
    }

    function saveStore() {
      localStorage.setItem(STORE_KEY, JSON.stringify(store));
    }

    function getActive() {
      return store.notes.find(n => n.id === store.activeId) || store.notes[0];
    }

    // ── Tab rendering ───────────────────────────────
    function renderTabs() {
      tabBar.querySelectorAll('.tab').forEach(t => t.remove());

      store.notes.forEach(note => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (note.id === store.activeId ? ' active' : '');
        tab.textContent = note.title;
        tab.title = note.title;
        tab.dataset.id = note.id;

        tab.addEventListener('click', () => {
          if (note.id === store.activeId) {
            startRename(tab, note);
          } else {
            switchTab(note.id);
          }
        });
        tab.addEventListener('contextmenu', e => {
          e.preventDefault();
          if (store.notes.length <= 1) return;
          if (confirm('Delete "' + note.title + '"?')) deleteNote(note.id);
        });

        tabBar.insertBefore(tab, addBtn);
      });
    }

    function switchTab(id) {
      saveCurrent();
      store.activeId = id;
      saveStore();
      loadActive();
      renderTabs();
    }

    function loadActive() {
      const note = getActive();
      ta.value = note.content;
      updateWc();
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }

    function saveCurrent() {
      const note = getActive();
      note.content = ta.value;
    }

    function addNote() {
      saveCurrent();
      const n = { id: uid(), title: 'Note', content: '' };
      store.notes.push(n);
      store.activeId = n.id;
      saveStore();
      loadActive();
      renderTabs();
      pushNoteToNotion(n.id, n.title, n.content);

      // Auto-start renaming the new tab
      const newTab = tabBar.querySelector('.tab.active');
      if (newTab) startRename(newTab, n);
    }

    function deleteNote(id) {
      store.notes = store.notes.filter(n => n.id !== id);
      if (store.activeId === id) store.activeId = store.notes[0].id;
      saveStore();
      loadActive();
      renderTabs();
      deleteNoteFromNotion(id);
    }

    function startRename(tabEl, note) {
      const input = document.createElement('input');
      input.className = 'tab-title-input';
      input.value = note.title;
      tabEl.textContent = '';
      tabEl.appendChild(input);
      input.focus();
      input.select();

      const commit = () => {
        note.title = input.value.trim() || 'Note';
        saveStore();
        renderTabs();
        pushNoteToNotion(note.id, note.title, note.content);
      };

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') renderTabs();
      });
      // Prevent tab click from firing while renaming
      input.addEventListener('click', e => e.stopPropagation());
    }

    // ── Auto-save (debounced 700 ms) ────────────────
    let saveTimer;
    ta.addEventListener('input', () => {
      updateWc();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(persist, 700);
    });

    function persist() {
      saveCurrent();
      saveStore();
      flashSaved();
      const note = getActive();
      pushNoteToNotion(note.id, note.title, note.content);
    }

    function flashSaved() {
      savedDot.classList.add('show');
      clearTimeout(savedDot._t);
      savedDot._t = setTimeout(() => savedDot.classList.remove('show'), 1600);
    }

    function updateWc() {
      const words = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
      wcEl.textContent = words > 0 ? words + 'w' : '';
    }

    // ── Two-click clear ─────────────────────────────
    let pendingClear = false, clearTimer;

    clearBtn.addEventListener('click', () => {
      if (!ta.value) return;
      if (!pendingClear) {
        pendingClear = true;
        clearBtn.textContent = '?';
        clearBtn.classList.add('danger');
        clearTimer = setTimeout(cancelClear, 2500);
      } else {
        cancelClear();
        ta.value = '';
        persist();
        updateWc();
        ta.focus();
      }
    });

    function cancelClear() {
      pendingClear = false;
      clearTimeout(clearTimer);
      clearBtn.textContent = '×';
      clearBtn.classList.remove('danger');
    }

    // ── Sync ─────────────────────────────────────────
    const sync = WidgetSync.init({ name: 'sticky', key: 'sticky', indicatorEl: '#syncStatus' });

    async function syncFromNotion() {
      if (!sync.url) return;
      const json = await sync.send({ action: 'sticky-sync' });
      if (json && json.ok && json.notes) {
        const localIds = new Set(store.notes.map(n => n.id));
        for (const rn of json.notes) {
          if (!localIds.has(rn.id)) {
            store.notes.push({ id: rn.id, title: rn.title || 'Note', content: rn.content || '' });
          } else {
            const local = store.notes.find(n => n.id === rn.id);
            if (local) {
              local.title = rn.title || local.title;
              local.content = rn.content ?? local.content;
            }
          }
        }
        saveStore();
        renderTabs();
        loadActive();
      }
    }

    async function pushNoteToNotion(noteId, title, content) {
      await sync.send({ action: 'sticky-save', noteId, title, content });
    }

    async function deleteNoteFromNotion(noteId) {
      await sync.send({ action: 'sticky-delete', noteId });
    }

    // ── Settings handlers ────────────────────────────
    document.getElementById('gearBtn').addEventListener('click', () => {
      document.getElementById('syncUrlInput').value = sync.url;
      document.getElementById('testResult').textContent = '';
      document.getElementById('settingsPanel').classList.add('open');
    });
    document.getElementById('cancelSettingsBtn').addEventListener('click', () => {
      document.getElementById('settingsPanel').classList.remove('open');
    });
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
      sync.saveUrl(document.getElementById('syncUrlInput').value.trim());
      document.getElementById('settingsPanel').classList.remove('open');
      if (sync.url) syncFromNotion();
    });
    document.getElementById('testSyncBtn').addEventListener('click', async () => {
      const rEl = document.getElementById('testResult');
      const url = document.getElementById('syncUrlInput').value.trim();
      const res = await WidgetSync.testConnection(url, { action: 'sticky-sync' });
      rEl.textContent = res.message;
      rEl.style.color = res.ok ? '#4ade80' : '#e74c3c';
    });

    // ── Init ────────────────────────────────────────
    loadStore();
    renderTabs();
    loadActive();
    addBtn.addEventListener('click', addNote);
    if (sync.url) syncFromNotion();
  </script>
</body>
</html>
